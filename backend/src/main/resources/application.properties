# Server Port Configuration
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/placement_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
# Update this password to match your MySQL server password
spring.datasource.password=8144975283
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom File Upload Directory
file.upload-dir=./uploads/resumes

# JWT Security Settings
# Base64 encoded secret key (at least 256 bits). Below is a pre-generated secure key for HS256:
# String representation: "secretkeysecretkeysecretkeysecretkeysecretkeysecretkey" in Base64
jwt.secret=c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5
# Access token expiration time (e.g., 24 Hours = 86400000 ms)
jwt.expiration=86400000
# Refresh token expiration time (e.g., 7 Days = 604800000 ms)
jwt.refresh-expiration=604800000

# Enable Swagger API docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Force Jackson to write dates as standard ISO strings (YYYY-MM-DD) instead of arrays
spring.jackson.serialization.write-dates-as-timestamps=false
